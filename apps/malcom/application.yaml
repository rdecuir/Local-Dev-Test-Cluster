apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: malcolm
  namespace: argocd
spec:
  project: default                                # Reference to your AppProject
  destination:
    server: https://kubernetes.default.svc        # In-cluster Kubernetes API
    namespace: malcolm                          # Target namespace for the app
  
  sources:
    - repoURL: https://github.com/rdecuir/Local-Dev-Test-Cluster
      targetRevision: main
      # path: apps/malcolm/manifest
      ref: values

    - repoURL: https://raw.githubusercontent.com/idaholab/Malcolm-Helm/refs/heads/helm-repo/
      chart: malcolm
      targetRevision: 26.01.0
      helm:
        ignoreMissingValueFiles: true
        valueFiles:
          - $values/apps/malcolm/values/common.yaml

  syncPolicy:
    automated:
      prune: true                                # Delete resources no longer defined
      selfHeal: true                             # Reapply if drift is detected
    syncOptions:
      - CreateNamespace=true